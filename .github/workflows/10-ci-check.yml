name: 10-ci-check

on:
  workflow_dispatch:
  push:
    branches:
      - "feature-*"
      - "hotfix-*"
    paths:
      - "infra/**"
      - "modules/**"
      - ".github/actions/tf-lint-check/**"
      - ".github/actions/security-scan/**"
      - ".github/workflows/10-ci-check.yml"
  pull_request:
    branches:
      - main
    paths:
      - "infra/**"
      - "modules/**"
      - ".github/actions/tf-lint-check/**"
      - ".github/actions/security-scan/**"
      - ".github/workflows/10-ci-check.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read
  pull-requests: read
  security-events: write

env:
  TF_VERSION: "1.15.2"
  TFLINT_VERSION: "v0.58.1"
  WORKING_DIR: infra/dev
  TF_SCAN_DIR: infra
  K8S_SCAN_DIR: app

jobs:
  tf-lint-check:
    name: tf-lint-check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: TF Lint Check
        uses: ./.github/actions/tf-lint-check
        with:
          working-directory: ${{ env.WORKING_DIR }}
          terraform-version: ${{ env.TF_VERSION }}
          tflint-version: ${{ env.TFLINT_VERSION }}

  tf-sec-scan:
    name: tf-sec-scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Trivy IaC Scan (Terraform)
        uses: ./.github/actions/security-scan
        with:
          scan-mode: config
          scan-ref: ${{ env.TF_SCAN_DIR }}
          skip-dirs: "**/.terraform,**/terraform-aws-modules"
          sarif-category: trivy-iac-terraform
          summary-title: Trivy IaC scan (Terraform)
          trivyignores: ${{ github.workspace }}/.trivyignore

