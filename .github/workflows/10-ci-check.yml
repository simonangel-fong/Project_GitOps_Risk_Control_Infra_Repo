name: 10-ci-check

on:
  workflow_dispatch:
  push:
    branches:
      - "feature-*"
      - "hotfix-*"
    paths:
      - "infra/**"
      - "modules/**"
      - ".github/actions/**"
      - ".github/workflows/**"
  pull_request:
    branches:
      - dev
      - stage
      - prod
    paths:
      - "infra/**"
      - "modules/**"
      - ".github/actions/**"
      - ".github/workflows/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: none
  contents: read
  pull-requests: write
  security-events: write

jobs:
  validate:
    name: validate
    uses: ./.github/workflows/_validate.yml

  notify-slack:
    name: notify-slack
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [validate]
    if: always()
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Notify Slack
        uses: ./.github/actions/notify-slack
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          needs-context: ${{ toJSON(needs) }}
