name: 90-tf-destroy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment to destroy.
        type: choice
        required: true
        options:
          - dev
          - stage
          - prod
      confirm:
        description: Type the environment name exactly to confirm (case-sensitive).
        type: string
        required: true

concurrency:
  group: cd-destroy-${{ inputs.environment }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  confirm-input:
    name: confirm-input
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Verify confirm matches environment (exact, case-sensitive)
        env:
          ENVIRONMENT: ${{ inputs.environment }}
          CONFIRM: ${{ inputs.confirm }}
        run: |
          if [ "$CONFIRM" != "$ENVIRONMENT" ]; then
            echo "::error::Confirm input '$CONFIRM' does not exactly match environment '$ENVIRONMENT'. Aborting destroy."
            exit 1
          fi
          echo "Confirmed destroy of environment '$ENVIRONMENT'."

