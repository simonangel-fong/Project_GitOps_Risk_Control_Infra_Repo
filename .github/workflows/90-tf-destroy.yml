  destroy-plan:
    name: destroy-plan (prod)
    if: inputs.environment == 'prod'
    needs: confirm-input
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: prod
    env:
      TF_VAR_env: ${{ vars.ENV }}
      TF_VAR_aws_region: ${{ vars.AWS_REGION }}
      TF_VAR_cloudflare_api_key: ${{ secrets.TF_VAR_cloudflare_api_key }}
      TF_VAR_slack_bot_token: ${{ secrets.TF_VAR_slack_bot_token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Terraform destroy plan
        uses: ./.github/actions/tf-apply
        with:
          mode: plan
          is-destroy: "true"
          tf-env: prod
          project-name: ${{ vars.PROJECT_NAME }}
          aws-cicd-role-arn: ${{ secrets.AWS_CICD_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          aws-backend-bucket: ${{ secrets.AWS_BACKEND_BUCKET }}

  destroy-apply:
    name: destroy-apply (prod)
    if: inputs.environment == 'prod'
    needs: destroy-plan
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: prod
    env:
      TF_VAR_env: ${{ vars.ENV }}
      TF_VAR_aws_region: ${{ vars.AWS_REGION }}
      TF_VAR_cloudflare_api_key: ${{ secrets.TF_VAR_cloudflare_api_key }}
      TF_VAR_slack_bot_token: ${{ secrets.TF_VAR_slack_bot_token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Terraform destroy apply
        uses: ./.github/actions/tf-apply
        with:
          mode: apply
          is-destroy: "true"
          tf-env: prod
          project-name: ${{ vars.PROJECT_NAME }}
          aws-cicd-role-arn: ${{ secrets.AWS_CICD_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          aws-backend-bucket: ${{ secrets.AWS_BACKEND_BUCKET }}

  notify-slack:
    name: notify-slack
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [confirm-input, destroy-plan-apply, destroy-plan, destroy-apply]
    if: always()
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Notify Slack
        uses: ./.github/actions/notify-slack
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          needs-context: ${{ toJSON(needs) }}
